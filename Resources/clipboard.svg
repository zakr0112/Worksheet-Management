<svg width="64" height="64" viewBox="0 0 64 64"
     xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Worksheet Manager">
  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="10" ry="10"
        fill="#f5f7fb"/>

  <!-- Clipboard body -->
  <rect x="16" y="14" width="32" height="40" rx="4" ry="4"
        fill="#ffffff" stroke="#c5d0e6" stroke-width="1.5"/>

  <!-- Clipboard top bar -->
  <rect x="22" y="10" width="20" height="8" rx="3" ry="3"
        fill="#4b6fbf"/>

  <!-- Clipboard clip -->
  <circle cx="32" cy="14" r="3" fill="#f5f7fb"/>

  <!-- Checklist items: checkboxes -->
  <rect x="20" y="22" width="6" height="6" rx="1" ry="1"
        fill="none" stroke="#4b6fbf" stroke-width="1.3"/>
  <rect x="20" y="30" width="6" height="6" rx="1" ry="1"
        fill="none" stroke="#4b6fbf" stroke-width="1.3"/>
  <rect x="20" y="38" width="6" height="6" rx="1" ry="1"
        fill="none" stroke="#4b6fbf" stroke-width="1.3"/>

  <!-- Checklist ticks -->
  <path d="M21.2 24.8 L22.7 26.3 L24.8 22.9"
        fill="none" stroke="#2f9f7b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M21.2 32.8 L22.7 34.3 L24.8 30.9"
        fill="none" stroke="#2f9f7b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M21.2 40.8 L22.7 42.3 L24.8 38.9"
        fill="none" stroke="#2f9f7b" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checklist text lines -->
  <rect x="28" y="23" width="16" height="2" rx="1" ry="1" fill="#c5d0e6"/>
  <rect x="28" y="31" width="14" height="2" rx="1" ry="1" fill="#c5d0e6"/>
  <rect x="28" y="39" width="18" height="2" rx="1" ry="1" fill="#c5d0e6"/>

  <!-- ZR monogram badge -->
  <g transform="translate(18,42)">
    <rect x="0" y="0" width="28" height="14" rx="3" ry="3"
          fill="#2f9f7b"/>
    <!-- Z -->
    <path d="M4 4 H10 L4 10 H10"
          fill="none" stroke="#ffffff" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- R -->
    <path d="M14 4 V10
             M14 4 H18
             A2 2 0 0 1 18 8 H14
             M16 8 L18.5 10"
          fill="none" stroke="#ffffff" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
